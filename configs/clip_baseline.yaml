dataset:
  annotations: data/charades_sta/charades_sta_test.txt
  videos_dir: data/raw/charades/videos
  min_queries: 1000
  max_queries: 1000

frame_extraction:
  fps: 1.0

clip:
  model_name: ViT-B/32
  device: auto
  batch_size: 32

retrieval:
  mode: windows
  window_size: 16.0
  stride: 8.0
  aggregation: mean
  smoothing: null

output:
  output_dir: results/charades_sta_sweep_1000
  embeddings_dir: results/charades_sta_sweep_1000/embeddings
